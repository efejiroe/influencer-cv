name: Manual Influencer Seed Script
on:
  workflow_dispatch:

jobs:
  run-seed-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    env:
      YT_DATA_API_KEY: ${{ secrets.YT_DATA_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Install dependencies
        run: |
          install.packages("pacman")
          source("ini.R")
        shell: Rscript {0}

      - name: Run Seed Script
        run: Rscript seed_influencer_form.R

      - name: Commit and Push Baselines
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/form_baselines.csv || echo "No baselines added"
          git commit -m "Automated seeding of influencer baselines: $(date)" || echo "No changes to commit"
          git push
